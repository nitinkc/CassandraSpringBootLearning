services:
  cassandra:
    image: cassandra:5.0.6
    container_name: cassandra-labs
    hostname: cassandra
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: cassandra-labs
      CASSANDRA_DC: datacenter1
      CASSANDRA_RACK: rack1
      CASSANDRA_SEEDS: cassandra
      JVM_OPTS: "-Xms512M -Xmx512M"
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 256M
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      CASSANDRA_AUTHENTICATOR: AllowAllAuthenticator
      CASSANDRA_AUTHORIZER: AllowAllAuthorizer
    volumes:
      - ./init.cql:/init/init.cql
      - ../labs:/labs:ro
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'SELECT now() FROM system.local'"]
      interval: 10s
      timeout: 5s
      retries: 20

  cassandra2:
    image: cassandra:5.0.6
    container_name: cassandra-labs-2
    hostname: cassandra2
    environment:
      CASSANDRA_CLUSTER_NAME: cassandra-labs
      CASSANDRA_DC: datacenter1
      CASSANDRA_RACK: rack2
      CASSANDRA_SEEDS: cassandra
      JVM_OPTS: "-Xms512M -Xmx512M"
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 256M
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      CASSANDRA_AUTHENTICATOR: AllowAllAuthenticator
      CASSANDRA_AUTHORIZER: AllowAllAuthorizer
    depends_on:
      cassandra:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'SELECT now() FROM system.local'"]
      interval: 10s
      timeout: 5s
      retries: 20

  cassandra-init:
    image: cassandra:5.0.6
    depends_on:
      cassandra:
        condition: service_healthy
    volumes:
      - ./init.cql:/init/init.cql
    entrypoint: ["/bin/bash", "-c", "cqlsh cassandra -f /init/init.cql"]
    restart: "on-failure"
